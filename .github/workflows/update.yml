name: Update Subscriptions

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maxminddb

      - name: Download Xray Core
        run: |
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip xray
          chmod +x xray

      - name: Ensure Base Files Exist
        run: |
          touch white_ip.txt
          touch incoming_sources.txt
          if [ ! -f white_ip_health.json ]; then echo "{}" > white_ip_health.json; fi

      - name: Create source files from Secrets
        env:
          SOURCES_WL_SECRET: ${{ secrets.SOURCES_WL }}
          SOURCES_BL_SECRET: ${{ secrets.SOURCES_BL }}
        run: |
          if [ -n "$SOURCES_WL_SECRET" ]; then
            echo "$SOURCES_WL_SECRET" > sources_wl.txt
            echo "✅ WL-источники загружены из GitHub Secrets"
          fi

          if [ -n "$SOURCES_BL_SECRET" ]; then
            echo "$SOURCES_BL_SECRET" > sources_bl.txt
            echo "✅ BL-источники загружены из GitHub Secrets"
          fi

          curl -L -o GeoLite2-Country.mmdb https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb

      - name: Run Parser Script
        run: python parser.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Удаляем временные скачанные файлы перед добавлением в Git
          rm -f xray xray.zip GeoLite2-Country.mmdb
          
          # Добавляем только целевые файлы списков
          git add white_ip.txt white_ip_health.json alive_*.txt incoming_sources.txt
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update subscriptions & clean white IP base [skip ci]"
            git pull --rebase --autostash origin main
            git push origin main
          else
            echo "Нет изменений для коммита."
          fi

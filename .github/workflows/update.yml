name: Update Subscriptions

on:
  schedule:
    - cron: '0 */4 * * *' # Каждые 4 часа
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maxminddb

      - name: Create source files from Secrets
        env:
          SOURCES_WL_SECRET: ${{ secrets.SOURCES_WL }}
          SOURCES_BL_SECRET: ${{ secrets.SOURCES_BL }}
        run: |
          # Проверяем секрет SOURCES_WL безопасным образом
          if [ -n "$SOURCES_WL_SECRET" ]; then
            echo "$SOURCES_WL_SECRET" > sources_wl.txt
            echo "✅ WL-источники загружены из GitHub Secrets"
          else
            echo "ℹ️ Секрет SOURCES_WL пустой или отсутствует. Используем файлы из репозитория"
          fi

          # Проверяем секрет SOURCES_BL безопасным образом
          if [ -n "$SOURCES_BL_SECRET" ]; then
            echo "$SOURCES_BL_SECRET" > sources_bl.txt
            echo "✅ BL-источники загружены из GitHub Secrets"
          else
            echo "ℹ️ Секрет SOURCES_BL пустой или отсутствует. Используем файлы из репозитория"
          fi

          # Скачиваем саму базу данных GeoIP прямо в окружение гитхаба
          curl -L -o GeoLite2-Country.mmdb https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb

      - name: Run Parser Script
        run: python parser.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Загружаем обратно ТОЛЬКО результаты в Base64. Источники и файл базы данных не улетают в репозиторий!
          git add alive_full.txt alive_bs.txt alive_bl.txt
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update subscriptions [skip ci]" && git push)
